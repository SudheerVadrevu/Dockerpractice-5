name: expense
networks:
  default:
   name: sundari
volumes:
  sudheer:
  #  external: true

services:

  mysql:
    
    image: expense-database:0.0
    container_name: mysql
    volumes:
      - source: sudheer
        target: /var/lib/mysql
        type: volume

  backend:

    image: expense-backend:0.0
    container_name: backend
    command: sh -c "sleep 98 && node /opt/server/index.js"
    ports:
      - 8080:8080
    depends_on:
      - mysql
  
  frontend:
    image: expense-frontend:0.0
    container_name: frontend
    ports:
      - 80:80
    depends_on:
      - backend
    

