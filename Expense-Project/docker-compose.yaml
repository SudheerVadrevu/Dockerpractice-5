name: expense
networks:
  default:
    name: vedurpaka
volumes:
  spyder:

services:

    mysql:
      image: expense-database:0.0
      container_name: mysql
      volumes:
       - source: spyder
         target: /var/lib/mysql
         type: volume

    backend:
      image: expense-backend:0.0
      container_name: backend
      command: sh -c "sleep 25 && node /opt/server/index.js"
      depends_on:
       - mysql
    
    frontend:
      image: expense-frontend:0.0
      container_name: frontend
      depends_on:
       - backend
      ports:
       - 80:80
