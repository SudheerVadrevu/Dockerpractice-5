name: expense
networks:
  default:
    name: vedurpaka

services:

    mysql:
      image: expense-database:0.0
      container_name: mysql

    backend:
      image: expense-backend:0.0
      container_name: backend
      command: sh -c "sleep 25 && node /opt/server/index.js"
      depends_on:
       - mysql
    
    frontend:
      image: expense-frontend:0.0
      container_name: frontend
      depends_on:
       - backend
      ports:
       - 80:80
