name: expense
networks:
  default:
    name: Rajahmundry
volumes:
    vijaywada:
services:

   mysql:
    image: expense-database:0.0
    container_name: mysql
    volumes:
      - source: vijaywada
        target: /var/lib/mysql
        type: volume

   backend:
    image: expense-backend:0.0
    container_name: backend
    depends_on:
      - mysql
    command: sh -c "sleep 88 && node /opt/server/index.js"
    ports:
      - 8080:8080
  
   frontend:
    image: expense-frontend:0.0
    container_name: frontend
    depends_on:
      - backend
    ports:
      - 80:80



